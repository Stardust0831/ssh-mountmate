name: Build Python Port

on:
  workflow_dispatch:
  push:
    branches:
      - experiment/python-crossplatform-gui

permissions:
  contents: read

jobs:
  build-python-port:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SSHMountMate-python-port-windows
          - os: macos-latest
            artifact: SSHMountMate-python-port-macos
          - os: ubuntu-latest
            artifact: SSHMountMate-python-port-linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "python_port[build]"

      - name: Build Python port artifact
        run: python python_port/build/build_local.py

      - name: List artifacts
        shell: bash
        run: find python_port/dist -maxdepth 2 -type f -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: python_port/dist/*
