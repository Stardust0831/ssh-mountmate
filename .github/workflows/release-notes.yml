name: Update Release Notes

on:
  push:
    branches:
      - main
    paths:
      - "release-notes/v*.md"
      - ".github/workflows/release-notes.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Update release notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tags=("${INPUT_TAG}")
          else
            mapfile -t tags < <(
              git diff --name-only --diff-filter=AM "${PUSH_BEFORE}" "${PUSH_AFTER}" -- 'release-notes/v*.md' |
                sed -E 's#^release-notes/(v.*)\.md$#\1#'
            )
          fi

          if [ "${#tags[@]}" -eq 0 ]; then
            echo "No added or modified release notes in this push; skipping."
            exit 0
          fi

          for TAG in "${tags[@]}"; do
            NOTES="release-notes/${TAG}.md"
            if [ ! -f "${NOTES}" ]; then
              echo "Release notes not found: ${NOTES}" >&2
              exit 1
            fi

            if ! gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
                echo "Release not found: ${TAG}" >&2
                exit 1
              fi
              echo "Release ${TAG} does not exist yet; skipping notes update."
              continue
            fi

            gh release edit "${TAG}" --notes-file "${NOTES}" --repo "${GITHUB_REPOSITORY}"
          done
