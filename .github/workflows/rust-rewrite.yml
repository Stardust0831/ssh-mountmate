name: Rust rewrite

on:
  push:
    branches:
      - rust-rewrite
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - name: Linux GUI dependencies
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libgl1-mesa-dri libgtk-3-dev libayatana-appindicator3-dev xvfb xdotool openbox dbus-x11
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo build --package ssh-mountmate
      - name: Single-instance GUI smoke test
        run: xvfb-run -a dbus-run-session -- bash tests/rust_single_instance_smoke.sh target/debug/SSHMountMate

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SSHMountMate-rust-windows-x64
            rclone_platform: windows
            rclone_arch: amd64
            rclone_sha256: ef097ef9de37a57feb7d9f9c7afb34148ad3c65be8025f1d8f7f521554a701ea
          - os: windows-11-arm
            artifact: SSHMountMate-rust-windows-arm64
            rclone_platform: windows
            rclone_arch: arm64
            rclone_sha256: 72194ad0aaf210d7a55808801191fecc7e175444dab7be7491b7a63074521f3a
          - os: macos-15-intel
            artifact: SSHMountMate-rust-macos-x64
            rclone_platform: osx
            rclone_arch: amd64
            rclone_sha256: 4188aa84043d7a6240912923f47639a9d2da21f3b40a521c065c8d92e66563f6
          - os: macos-14
            artifact: SSHMountMate-rust-macos-arm64
            rclone_platform: osx
            rclone_arch: arm64
            rclone_sha256: c2100e2d4a4b3be04c55cd45380cafe7647e1ad772bb055f52f00876ed701167
          - os: ubuntu-latest
            artifact: SSHMountMate-rust-linux-x64
            rclone_platform: linux
            rclone_arch: amd64
            rclone_sha256: fe435e0c36228e7c2f116a8701f01127bb1f694005fc11d1f27186c8bca4115d
          - os: ubuntu-24.04-arm
            artifact: SSHMountMate-rust-linux-arm64
            rclone_platform: linux
            rclone_arch: arm64
            rclone_sha256: 97685285c9ad6a0cf17d5844115d2a67245af6444db672187074bd9c358de419
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.0
      - name: Linux GUI dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev libayatana-appindicator3-dev
      - run: cargo test --workspace --all-features
      - run: cargo build --release --package ssh-mountmate
      - name: Smoke-test command-line entry points
        if: runner.os != 'Windows'
        shell: bash
        run: |
          target/release/SSHMountMate --version
          target/release/SSHMountMate --help >/dev/null
          target/release/SSHMountMate --licenses >/dev/null
      - name: Smoke-test Linux file-manager integration
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/file-manager-home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          target/release/SSHMountMate --register-file-manager-menu
          test -x "${XDG_DATA_HOME}/nautilus/scripts/SSH MountMate - Refresh"
          test -f "${XDG_DATA_HOME}/nemo/actions/ssh-mountmate-refresh.nemo_action"
          test -f "${XDG_DATA_HOME}/kio/servicemenus/ssh-mountmate.desktop"
          rg --fixed-strings -- '--refresh-path %f' \
            "${XDG_DATA_HOME}/kio/servicemenus/ssh-mountmate.desktop"
          target/release/SSHMountMate --unregister-file-manager-menu
          test ! -e "${XDG_DATA_HOME}/nautilus/scripts/SSH MountMate - Refresh"
          test ! -e "${XDG_DATA_HOME}/nemo/actions/ssh-mountmate-refresh.nemo_action"
          test ! -e "${XDG_DATA_HOME}/kio/servicemenus/ssh-mountmate.desktop"
          export XDG_CONFIG_HOME="${HOME}/.config"
          target/release/SSHMountMate --register-login-startup
          startup="${XDG_CONFIG_HOME}/autostart/ssh-mountmate.desktop"
          test -f "${startup}"
          rg --fixed-strings -- '--mount-startup-all' "${startup}"
          target/release/SSHMountMate --unregister-login-startup
          test ! -e "${startup}"
      - name: Smoke-test macOS login startup
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/login-startup-home"
          executable="$(pwd)/target/release/SSHMountMate"
          target/release/SSHMountMate --register-login-startup
          startup="${HOME}/Library/LaunchAgents/io.github.stardust0831.ssh-mountmate.plist"
          plutil -lint "${startup}"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ProgramArguments:0' "${startup}")" = "${executable}"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ProgramArguments:1' "${startup}")" = '--mount-startup-all'
          target/release/SSHMountMate --unregister-login-startup
          test ! -e "${startup}"
      - name: Smoke-test command-line entry points
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = (Resolve-Path .\target\release\SSHMountMate.exe).Path
          function Invoke-SSHMountMate([string] $argument) {
            $process = Start-Process -FilePath $exe -ArgumentList $argument -Wait -PassThru
            if ($process.ExitCode -ne 0) { throw "SSH MountMate $argument failed" }
          }
          Invoke-SSHMountMate '--version'
          Invoke-SSHMountMate '--help'
          Invoke-SSHMountMate '--licenses'
          try {
            Invoke-SSHMountMate '--register-file-manager-menu'

            $driveRefresh = (Get-Item 'HKCU:\Software\Classes\Drive\shell\SSHMountMate.Refresh\command').GetValue('')
            $backgroundRefresh = (Get-Item 'HKCU:\Software\Classes\Directory\Background\shell\SSHMountMate.Refresh\command').GetValue('')
            $driveTransfers = (Get-Item 'HKCU:\Software\Classes\Drive\shell\SSHMountMate.Transfers\command').GetValue('')
            $notificationName = (Get-Item 'HKCU:\Software\Classes\AppUserModelId\Stardust.SSHMountMate').GetValue('DisplayName')
            if ($driveRefresh -ne "`"$exe`" --refresh-path `"%1\.`"") {
              throw "Unexpected drive refresh command: $driveRefresh"
            }
            if ($backgroundRefresh -ne "`"$exe`" --refresh-path `"%V\.`"") {
              throw "Unexpected background refresh command: $backgroundRefresh"
            }
            if ($driveTransfers -ne "`"$exe`" --show-transfers") {
              throw "Unexpected transfer command: $driveTransfers"
            }
            if ($notificationName -ne 'SSH MountMate') {
              throw "Unexpected notification identity: $notificationName"
            }
            Invoke-SSHMountMate '--register-login-startup'
            $startup = (Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Run').SSHMountMate
            if ($startup -ne "`"$exe`" --mount-startup-all") {
              throw "Unexpected login startup command: $startup"
            }
          } finally {
            Invoke-SSHMountMate '--unregister-file-manager-menu'
            Invoke-SSHMountMate '--unregister-login-startup'
          }
          if (Test-Path 'HKCU:\Software\Classes\Drive\shell\SSHMountMate.Refresh') {
            throw "Explorer refresh command was not removed"
          }
          if ((Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Run').PSObject.Properties.Name -contains 'SSHMountMate') {
            throw "Login startup command was not removed"
          }
      - name: Bundle verified rclone
        if: runner.os != 'Windows'
        shell: bash
        env:
          RCLONE_VERSION: v1.74.4
          RCLONE_PLATFORM: ${{ matrix.rclone_platform }}
          RCLONE_ARCH: ${{ matrix.rclone_arch }}
          RCLONE_SHA256: ${{ matrix.rclone_sha256 }}
        run: |
          set -euo pipefail
          archive="rclone-${RCLONE_VERSION}-${RCLONE_PLATFORM}-${RCLONE_ARCH}.zip"
          curl --fail --location --silent --show-error \
            "https://downloads.rclone.org/${RCLONE_VERSION}/${archive}" \
            --output "${RUNNER_TEMP}/${archive}"
          echo "${RCLONE_SHA256}  ${RUNNER_TEMP}/${archive}" | shasum -a 256 --check
          mkdir -p "${RUNNER_TEMP}/rclone" target/release/bin
          unzip -q "${RUNNER_TEMP}/${archive}" -d "${RUNNER_TEMP}/rclone"
          find "${RUNNER_TEMP}/rclone" -type f -name rclone -exec cp {} target/release/bin/rclone \;
          test -x target/release/bin/rclone || chmod 755 target/release/bin/rclone
          shasum -a 256 target/release/bin/rclone | awk '{print $1}' > target/release/bin/rclone.sha256
          cp THIRD_PARTY_NOTICES.md licenses/*.txt target/release/
          cp distribution/SSHMountMate.install-layout target/release/
      - name: Bundle verified rclone
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RCLONE_VERSION: v1.74.4
          RCLONE_PLATFORM: ${{ matrix.rclone_platform }}
          RCLONE_ARCH: ${{ matrix.rclone_arch }}
          RCLONE_SHA256: ${{ matrix.rclone_sha256 }}
        run: |
          $archive = "rclone-$env:RCLONE_VERSION-$env:RCLONE_PLATFORM-$env:RCLONE_ARCH.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP $archive
          Invoke-WebRequest "https://downloads.rclone.org/$env:RCLONE_VERSION/$archive" -OutFile $archivePath
          $actual = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLowerInvariant()
          if ($actual -ne $env:RCLONE_SHA256) { throw "rclone archive SHA-256 mismatch: $actual" }
          $extract = Join-Path $env:RUNNER_TEMP "rclone"
          Expand-Archive -Path $archivePath -DestinationPath $extract -Force
          New-Item -ItemType Directory -Force target/release/bin | Out-Null
          $binary = Get-ChildItem -Path $extract -Recurse -File -Filter rclone.exe | Select-Object -First 1
          if (-not $binary) { throw "rclone archive did not contain rclone.exe" }
          Copy-Item $binary.FullName target/release/bin/rclone.exe
          (Get-FileHash -Algorithm SHA256 target/release/bin/rclone.exe).Hash.ToLowerInvariant() |
            Set-Content -NoNewline target/release/bin/rclone.exe.sha256
          Copy-Item THIRD_PARTY_NOTICES.md, licenses/*.txt target/release/
          Copy-Item distribution/SSHMountMate.install-layout target/release/
      - name: Assemble and verify macOS application bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app="target/package/SSH MountMate.app"
          contents="${app}/Contents"
          mkdir -p "${contents}/MacOS" "${contents}/Resources/bin" "${contents}/Resources/licenses"
          cp target/release/SSHMountMate "${contents}/MacOS/SSHMountMate"
          cp target/release/bin/rclone target/release/bin/rclone.sha256 "${contents}/Resources/bin/"
          cp THIRD_PARTY_NOTICES.md licenses/*.txt "${contents}/Resources/licenses/"
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          sed -e "s/@VERSION@/${version}/g" -e "s/@BUILD_VERSION@/${GITHUB_RUN_NUMBER}/g" \
            distribution/macos/Info.plist > "${contents}/Info.plist"
          chmod 755 "${contents}/MacOS/SSHMountMate" "${contents}/Resources/bin/rclone"
          plutil -lint "${contents}/Info.plist"
          codesign --force --deep --sign - "${app}"
          codesign --verify --deep --strict --verbose=2 "${app}"
          "${contents}/MacOS/SSHMountMate" --version
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/SSHMountMate
            target/release/SSHMountMate.exe
            target/release/bin/rclone
            target/release/bin/rclone.sha256
            target/release/bin/rclone.exe
            target/release/bin/rclone.exe.sha256
            target/release/THIRD_PARTY_NOTICES.md
            target/release/*.txt
            target/release/rclone-COPYING.txt
            target/release/rfd-LICENSE.txt
            target/release/sys-locale-LICENSE-MIT.txt
            target/release/tray-icon-LICENSE-MIT.txt
            target/release/windows-LICENSE-MIT.txt
            target/release/notify-rust-LICENSE-MIT.txt
            target/release/tauri-winrt-notification-LICENSE-MIT.txt
            target/release/semver-LICENSE-MIT.txt
            target/release/zip-LICENSE-MIT.txt
            target/release/rustix-LICENSE-MIT.txt
            target/release/SSHMountMate.install-layout
            target/package/SSH MountMate.app
          if-no-files-found: error
