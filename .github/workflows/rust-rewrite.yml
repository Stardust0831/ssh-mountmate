name: Rust rewrite

on:
  push:
    branches:
      - rust-rewrite
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Check out pinned rclone source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: rclone/rclone
          ref: 5bc93a2a7ab0ebd0a11352bc4968eabeffb18027
          path: .rclone-source
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.25.0
          cache-dependency-path: .rclone-source/go.sum
      - name: Test patched rclone VFS behavior
        shell: bash
        run: sh scripts/build-patched-rclone.sh .rclone-source target/rclone-quality/rclone --test
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - name: Enforce Rust-only product tree
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git ls-files '*.py' '*.spec' pyproject.toml launcher.py)"
          python_action='actions/setup''-python'
          if git grep -n "${python_action}" -- .github; then
            echo 'Python setup actions are not allowed in the Rust product tree' >&2
            exit 1
          fi
      - name: Audit dependency licenses and sources
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe
        with:
          command: check
          command-arguments: licenses sources
          arguments: --all-features
      - name: Linux GUI dependencies
        run: sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 update && sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 install -y libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libgl1-mesa-dri libgtk-3-dev libayatana-appindicator3-dev xvfb xdotool openbox dbus-x11 dunst haskell-gtk-sni-tray-utils weston
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - name: Validate Windows installer contract
        shell: bash
        run: bash tests/windows_installer_static.sh
      - name: Verify live stable and prerelease update channels
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo test --package mountmate-core update_live_ --all-features -- --ignored --test-threads=1
      - name: Install stable Cargo for cross-target license metadata
        run: rustup toolchain install 1.88.0 --profile minimal
      - name: Verify generated Rust license inventory
        shell: bash
        env:
          CARGO_ABOUT_VERSION: 0.9.1
          CARGO_ABOUT_SHA256: c0e7dc6f5d74b0beec5c0053d39ab24514c717d19acd91886907a22457ea9e98
          CARGO_NET_RETRY: 10
          RUSTUP_TOOLCHAIN: 1.88.0
        run: |
          set -euo pipefail
          archive="cargo-about-${CARGO_ABOUT_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          url="https://github.com/EmbarkStudios/cargo-about/releases/download/${CARGO_ABOUT_VERSION}/${archive}"
          curl --fail --location --silent --show-error "${url}" --output "${RUNNER_TEMP}/${archive}"
          echo "${CARGO_ABOUT_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum --check
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}"
          cargo_about="${RUNNER_TEMP}/cargo-about-${CARGO_ABOUT_VERSION}-x86_64-unknown-linux-musl/cargo-about"
          test -x "${cargo_about}"
          "${cargo_about}" --version
          generated="${RUNNER_TEMP}/RUST-THIRD-PARTY.txt"
          sh scripts/generate-rust-licenses.sh "${cargo_about}" "${generated}" online
          cmp "${generated}" licenses/RUST-THIRD-PARTY.txt
      - run: cargo build --package ssh-mountmate
      - name: Build Freedesktop notification protocol probe
        run: cargo build --package ssh-mountmate --example freedesktop_notification_probe
      - name: Single-instance GUI smoke test
        run: xvfb-run -a dbus-run-session -- bash tests/rust_single_instance_smoke.sh target/debug/SSHMountMate
      - name: Wayland startup, notification, and tray capability smoke test
        run: dbus-run-session -- bash tests/rust_wayland_smoke.sh target/debug/SSHMountMate

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SSHMountMate-rust-windows-x64
            plink_arch: w64
            plink_sha256: e5621ffe4879f0ec39ed40f688db9399c2d43054d41ef14472fa335c4693b915
          - os: windows-11-arm
            artifact: SSHMountMate-rust-windows-arm64
            plink_arch: wa64
            plink_sha256: 998011ef455dabbb66c176913ea897a58e176402d53dc01607a5b36610a7f5fa
          - os: macos-15-intel
            artifact: SSHMountMate-rust-macos-x64
          - os: macos-14
            artifact: SSHMountMate-rust-macos-arm64
          - os: ubuntu-latest
            artifact: SSHMountMate-rust-linux-x64
          - os: ubuntu-24.04-arm
            artifact: SSHMountMate-rust-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Check out pinned rclone source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: rclone/rclone
          ref: 5bc93a2a7ab0ebd0a11352bc4968eabeffb18027
          path: .rclone-source
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: 1.25.0
          cache-dependency-path: .rclone-source/go.sum
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0
      - name: Linux GUI dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(dpkg --print-architecture)" = arm64 ]; then
            sudo find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) \
              -exec sed -i \
                's|http://ports.ubuntu.com/ubuntu-ports|https://mirror.leaseweb.com/ubuntu-ports|g' \
                {} +
            grep -Rqs 'https://mirror.leaseweb.com/ubuntu-ports' /etc/apt
          fi
          sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 update
          sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 install -y libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libgl1-mesa-dri libgtk-3-dev libayatana-appindicator3-dev zip xvfb xdotool openbox xterm dbus-x11 fuse3 jq kmod openssh-client
      - name: Install verified FUSE-T for macOS mount integration
        if: runner.os == 'macOS'
        shell: bash
        env:
          FUSE_T_VERSION: 1.2.7
          FUSE_T_SHA256: 6a29c747e61a86a405a189efc3de42812d73147135f93a1bb0624c1e7b90e654
        run: |
          set -euo pipefail
          package="fuse-t-macos-installer-${FUSE_T_VERSION}.pkg"
          curl --fail --location --silent --show-error \
            "https://github.com/macos-fuse-t/fuse-t/releases/download/${FUSE_T_VERSION}/${package}" \
            --output "${RUNNER_TEMP}/${package}"
          echo "${FUSE_T_SHA256}  ${RUNNER_TEMP}/${package}" | shasum -a 256 --check
          sudo installer -pkg "${RUNNER_TEMP}/${package}" -target /
          test -e /usr/local/lib/libfuse-t.dylib
      - run: cargo test --workspace --all-features
      - name: Exercise native system credential store
        if: runner.os == 'Windows' || runner.os == 'macOS'
        run: cargo test --package mountmate-core live_system_credential_roundtrip --all-features -- --ignored --exact --test-threads=1
      - run: cargo build --release --package ssh-mountmate

      - name: Verify Windows execution manifest
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $manifest = Join-Path $env:RUNNER_TEMP 'SSHMountMate.manifest'
          $sdkBin = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\bin'
          $toolArch = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'arm64' } else { 'x64' }
          $mt = Get-ChildItem $sdkBin -Filter mt.exe -Recurse -ErrorAction Stop |
            Where-Object { $_.Directory.Name -eq $toolArch } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $mt) { throw "Windows SDK mt.exe was not found for $toolArch" }
          & $mt.FullName -nologo "-inputresource:target/release/SSHMountMate.exe;#1" "-out:$manifest"
          if ($LASTEXITCODE -ne 0) { throw 'could not extract Windows execution manifest' }
          $content = Get-Content $manifest -Raw
          if ($content -notmatch 'requestedExecutionLevel' `
              -or $content -notmatch 'level="asInvoker"' `
              -or $content -notmatch 'uiAccess="false"') {
            throw "Windows executable is missing an explicit asInvoker manifest`n$content"
          }
          if ($content -match 'requireAdministrator|highestAvailable') {
            throw "Windows executable unexpectedly requests elevation`n$content"
          }
      - name: Smoke-test command-line entry points
        if: runner.os != 'Windows'
        shell: bash
        run: |
          target/release/SSHMountMate --version
          target/release/SSHMountMate --help >/dev/null
          target/release/SSHMountMate --licenses >/dev/null
      - name: Smoke-test Linux file-manager integration
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/file-manager-home"
          export XDG_DATA_HOME="${HOME}/.local/share"
          target/release/SSHMountMate --register-file-manager-menu
          test -x "${XDG_DATA_HOME}/nautilus/scripts/SSH MountMate - Refresh"
          test -f "${XDG_DATA_HOME}/nemo/actions/ssh-mountmate-refresh.nemo_action"
          test -f "${XDG_DATA_HOME}/kio/servicemenus/ssh-mountmate.desktop"
          grep -F -- '--refresh-path %f' \
            "${XDG_DATA_HOME}/kio/servicemenus/ssh-mountmate.desktop"
          target/release/SSHMountMate --unregister-file-manager-menu
          test ! -e "${XDG_DATA_HOME}/nautilus/scripts/SSH MountMate - Refresh"
          test ! -e "${XDG_DATA_HOME}/nemo/actions/ssh-mountmate-refresh.nemo_action"
          test ! -e "${XDG_DATA_HOME}/kio/servicemenus/ssh-mountmate.desktop"
          export XDG_CONFIG_HOME="${HOME}/.config"
          target/release/SSHMountMate --register-login-startup
          startup="${XDG_CONFIG_HOME}/autostart/ssh-mountmate.desktop"
          test -f "${startup}"
          grep -F -- '--mount-startup' "${startup}"
          target/release/SSHMountMate --unregister-login-startup
          test ! -e "${startup}"
      - name: Smoke-test macOS platform registration
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/platform-home"
          executable="$(pwd)/target/release/SSHMountMate"
          target/release/SSHMountMate --register-file-manager-menu
          refresh="${HOME}/Library/Services/SSH MountMate - Refresh.workflow/Contents/document.wflow"
          transfers="${HOME}/Library/Services/SSH MountMate - Transfers.workflow/Contents/document.wflow"
          plutil -lint "${refresh}" "${transfers}"
          test "$(/usr/libexec/PlistBuddy -c 'Print :workflowMetaData:workflowTypeIdentifier' "${refresh}")" = 'com.apple.Automator.servicesMenu'
          test "$(/usr/libexec/PlistBuddy -c 'Print :workflowMetaData:serviceApplicationBundleID' "${refresh}")" = 'com.apple.finder'
          command="$(/usr/libexec/PlistBuddy -c 'Print :actions:0:action:ActionParameters:COMMAND_STRING' "${refresh}")"
          test "${command}" = "exec '${executable}' --refresh-path \"\$1\""
          probe="${RUNNER_TEMP}/Finder Probe.workflow"
          cp -R "$(dirname "$(dirname "${refresh}")")" "${probe}"
          marker="${RUNNER_TEMP}/finder-workflow-ran"
          /usr/libexec/PlistBuddy -c "Set :actions:0:action:ActionParameters:COMMAND_STRING /usr/bin/touch '${marker}'" "${probe}/Contents/document.wflow"
          mkdir -p "${RUNNER_TEMP}/finder-selection"
          automator -i "${RUNNER_TEMP}/finder-selection" "${probe}"
          test -f "${marker}"
          target/release/SSHMountMate --unregister-file-manager-menu
          test ! -e "$(dirname "$(dirname "${refresh}")")"
          test ! -e "$(dirname "$(dirname "${transfers}")")"
          target/release/SSHMountMate --register-login-startup
          startup="${HOME}/Library/LaunchAgents/io.github.stardust0831.ssh-mountmate.plist"
          plutil -lint "${startup}"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ProgramArguments:0' "${startup}")" = "${executable}"
          test "$(/usr/libexec/PlistBuddy -c 'Print :ProgramArguments:1' "${startup}")" = '--mount-startup'
          target/release/SSHMountMate --unregister-login-startup
          test ! -e "${startup}"
      - name: Smoke-test command-line entry points
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = (Resolve-Path .\target\release\SSHMountMate.exe).Path
          function Invoke-SSHMountMate([string] $argument) {
            $process = Start-Process -FilePath $exe -ArgumentList $argument -Wait -PassThru
            if ($process.ExitCode -ne 0) { throw "SSH MountMate $argument failed" }
          }
          Invoke-SSHMountMate '--version'
          Invoke-SSHMountMate '--help'
          Invoke-SSHMountMate '--licenses'
          try {
            Invoke-SSHMountMate '--register-file-manager-menu'

            $driveRefresh = (Get-Item 'HKCU:\Software\Classes\Drive\shell\SSHMountMate.Refresh\command').GetValue('')
            $backgroundRefresh = (Get-Item 'HKCU:\Software\Classes\Directory\Background\shell\SSHMountMate.Refresh\command').GetValue('')
            $driveTransfers = (Get-Item 'HKCU:\Software\Classes\Drive\shell\SSHMountMate.Transfers\command').GetValue('')
            $notificationName = (Get-Item 'HKCU:\Software\Classes\AppUserModelId\Stardust.SSHMountMate').GetValue('DisplayName')
            if ($driveRefresh -ne "`"$exe`" --refresh-path `"%1\.`"") {
              throw "Unexpected drive refresh command: $driveRefresh"
            }
            if ($backgroundRefresh -ne "`"$exe`" --refresh-path `"%V\.`"") {
              throw "Unexpected background refresh command: $backgroundRefresh"
            }
            if ($driveTransfers -ne "`"$exe`" --show-transfers") {
              throw "Unexpected transfer command: $driveTransfers"
            }
            if ($notificationName -ne 'SSH MountMate') {
              throw "Unexpected notification identity: $notificationName"
            }
            Invoke-SSHMountMate '--register-login-startup'
            $startup = (Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Run').SSHMountMate
            if ($startup -ne "`"$exe`" --mount-startup") {
              throw "Unexpected login startup command: $startup"
            }
          } finally {
            Invoke-SSHMountMate '--unregister-file-manager-menu'
            Invoke-SSHMountMate '--unregister-login-startup'
          }
          if (Test-Path 'HKCU:\Software\Classes\Drive\shell\SSHMountMate.Refresh') {
            throw "Explorer refresh command was not removed"
          }
          if ((Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Run').PSObject.Properties.Name -contains 'SSHMountMate') {
            throw "Login startup command was not removed"
          }
      - name: Exercise Windows one-instance, tray, and taskbar integration
        if: runner.os == 'Windows'
        timeout-minutes: 3
        shell: pwsh
        run: ./tests/rust_windows_gui_smoke.ps1 -Binary target/release/SSHMountMate.exe
      - name: Build pinned patched rclone
        shell: bash
        run: |
          set -euo pipefail
          binary=rclone
          if [ "$RUNNER_OS" = Windows ]; then binary=rclone.exe; fi
          sh scripts/build-patched-rclone.sh .rclone-source "target/release/bin/${binary}"
          if [ "$RUNNER_OS" = macOS ]; then
            shasum -a 256 "target/release/bin/${binary}" | awk '{print $1}' > "target/release/bin/${binary}.sha256"
          else
            sha256sum "target/release/bin/${binary}" | awk '{print $1}' > "target/release/bin/${binary}.sha256"
          fi
          cp THIRD_PARTY_NOTICES.md licenses/*.txt target/release/
          cp distribution/SSHMountMate.install-layout target/release/
      - name: Bundle verified Plink
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PLINK_VERSION: '0.84'
          PLINK_ARCH: ${{ matrix.plink_arch }}
          PLINK_SHA256: ${{ matrix.plink_sha256 }}
        run: |
          $plinkUrl = "https://the.earth.li/~sgtatham/putty/$env:PLINK_VERSION/$env:PLINK_ARCH/plink.exe"
          Invoke-WebRequest $plinkUrl -OutFile target/release/bin/plink.exe
          $plinkActual = (Get-FileHash -Algorithm SHA256 target/release/bin/plink.exe).Hash.ToLowerInvariant()
          if ($plinkActual -ne $env:PLINK_SHA256) { throw "Plink SHA-256 mismatch: $plinkActual" }
          $plinkActual | Set-Content -NoNewline target/release/bin/plink.exe.sha256
          Copy-Item THIRD_PARTY_NOTICES.md, licenses/*.txt target/release/
          Copy-Item distribution/SSHMountMate.install-layout target/release/
      - name: Assemble and verify macOS application bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          app="target/package/SSH MountMate.app"
          contents="${app}/Contents"
          mkdir -p "${contents}/MacOS" "${contents}/Resources/bin" "${contents}/Resources/licenses"
          cp target/release/SSHMountMate "${contents}/MacOS/SSHMountMate"
          cp target/release/bin/rclone target/release/bin/rclone.sha256 "${contents}/Resources/bin/"
          cp THIRD_PARTY_NOTICES.md licenses/*.txt "${contents}/Resources/licenses/"
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          sed -e "s/@VERSION@/${version}/g" -e "s/@BUILD_VERSION@/${GITHUB_RUN_NUMBER}/g" \
            distribution/macos/Info.plist > "${contents}/Info.plist"
          chmod 755 "${contents}/MacOS/SSHMountMate" "${contents}/Resources/bin/rclone"
          plutil -lint "${contents}/Info.plist"
          codesign --force --deep --sign - "${app}"
          codesign --verify --deep --strict --verbose=2 "${app}"
          "${contents}/MacOS/SSHMountMate" --version
      - name: Exercise macOS notification, menu bar, and Dock integration
        if: runner.os == 'macOS'
        timeout-minutes: 3
        shell: bash
        run: bash tests/rust_macos_gui_smoke.sh "target/package/SSH MountMate.app"
      - name: Smoke-test packaged archive
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          root="target/package/SSHMountMate"
          archive="target/package-smoke/${{ matrix.artifact }}.zip"
          extracted="${RUNNER_TEMP}/package-smoke"
          mkdir -p "${root}/bin" "$(dirname "${archive}")"
          cp target/release/SSHMountMate "${root}/SSHMountMate"
          cp target/release/bin/rclone target/release/bin/rclone.sha256 "${root}/bin/"
          cp THIRD_PARTY_NOTICES.md licenses/*.txt distribution/SSHMountMate.install-layout "${root}/"
          chmod 755 "${root}/SSHMountMate" "${root}/bin/rclone"
          (cd target/package && zip -q -r "${GITHUB_WORKSPACE}/${archive}" SSHMountMate)
          unzip -q "${archive}" -d "${extracted}"
          "${extracted}/SSHMountMate/SSHMountMate" --version
          "${extracted}/SSHMountMate/bin/rclone" version
          test -z "$(find "${extracted}" -type f \( -iname '*.py' -o -iname 'python*' -o -iname 'libpython*' \) -print -quit)"
      - name: Smoke-test packaged archive
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          archive="target/package-smoke/${{ matrix.artifact }}.zip"
          extracted="${RUNNER_TEMP}/package-smoke"
          mkdir -p "$(dirname "${archive}")" "${extracted}"
          ditto -c -k --keepParent "target/package/SSH MountMate.app" "${archive}"
          ditto -x -k "${archive}" "${extracted}"
          app="${extracted}/SSH MountMate.app"
          codesign --verify --deep --strict --verbose=2 "${app}"
          "${app}/Contents/MacOS/SSHMountMate" --version
          "${app}/Contents/Resources/bin/rclone" version
          test -z "$(find "${extracted}" -type f \( -iname '*.py' -o -iname 'python*' -o -iname 'libpython*' \) -print -quit)"
      - name: Smoke-test packaged archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = 'target/package/SSHMountMate'
          $archive = 'target/package-smoke/${{ matrix.artifact }}.zip'
          $extracted = Join-Path $env:RUNNER_TEMP package-smoke
          New-Item -ItemType Directory -Force "$root/bin", (Split-Path $archive) | Out-Null
          Copy-Item target/release/SSHMountMate.exe "$root/SSHMountMate.exe"
          Copy-Item target/release/bin/rclone.exe, target/release/bin/rclone.exe.sha256, target/release/bin/plink.exe, target/release/bin/plink.exe.sha256 "$root/bin/"
          Copy-Item THIRD_PARTY_NOTICES.md, licenses/*.txt, distribution/SSHMountMate.install-layout $root
          Compress-Archive -Path $root -DestinationPath $archive
          Expand-Archive $archive $extracted
          $app = Start-Process -FilePath "$extracted/SSHMountMate/SSHMountMate.exe" -ArgumentList '--version' -Wait -PassThru
          if ($app.ExitCode -ne 0) { throw "packaged SSH MountMate smoke test failed" }
          $rclone = Start-Process -FilePath "$extracted/SSHMountMate/bin/rclone.exe" -ArgumentList 'version' -Wait -PassThru
          if ($rclone.ExitCode -ne 0) { throw "packaged rclone smoke test failed" }
          $plink = Start-Process -FilePath "$extracted/SSHMountMate/bin/plink.exe" -ArgumentList '-V' -Wait -PassThru
          if ($plink.ExitCode -ne 0) { throw "packaged Plink smoke test failed" }
          $python = Get-ChildItem $extracted -Recurse -File | Where-Object { $_.Name -match '^(python|libpython)' -or $_.Extension -eq '.py' }
          if ($python) { throw "packaged archive contains Python runtime files" }
      - name: Build and verify embedded-rclone onefile
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export SSH_MOUNTMATE_EMBED_RCLONE_PATH="$(pwd)/target/release/bin/rclone"
          export SSH_MOUNTMATE_EMBED_RCLONE_SHA256="$(tr -d '[:space:]' < target/release/bin/rclone.sha256)"
          cargo build --release --package ssh-mountmate
          mkdir -p target/onefile
          cp target/release/SSHMountMate target/onefile/SSHMountMate
          chmod 755 target/onefile/SSHMountMate
          home="${RUNNER_TEMP}/onefile-home"
          mkdir -p "${home}"
          rclone_path="$(
            HOME="${home}" \
            XDG_CONFIG_HOME="${home}/config" \
            XDG_CACHE_HOME="${home}/cache" \
            XDG_STATE_HOME="${home}/state" \
            XDG_DATA_HOME="${home}/data" \
            target/onefile/SSHMountMate --rclone-path
          )"
          test -x "${rclone_path}"
          test "$(shasum -a 256 "${rclone_path}" | awk '{print $1}')" = \
            "${SSH_MOUNTMATE_EMBED_RCLONE_SHA256}"
          "${rclone_path}" version
      - name: Build and verify embedded-rclone onefile
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:SSH_MOUNTMATE_EMBED_RCLONE_PATH = (Resolve-Path 'target/release/bin/rclone.exe').Path
          $env:SSH_MOUNTMATE_EMBED_RCLONE_SHA256 = (Get-Content 'target/release/bin/rclone.exe.sha256' -Raw).Trim()
          $env:SSH_MOUNTMATE_EMBED_PLINK_PATH = (Resolve-Path 'target/release/bin/plink.exe').Path
          $env:SSH_MOUNTMATE_EMBED_PLINK_SHA256 = (Get-Content 'target/release/bin/plink.exe.sha256' -Raw).Trim()
          cargo build --release --package ssh-mountmate
          if ($LASTEXITCODE -ne 0) { throw "onefile build failed" }
          New-Item -ItemType Directory -Force target/onefile | Out-Null
          Copy-Item target/release/SSHMountMate.exe target/onefile/SSHMountMate.exe
          $onefileHome = Join-Path $env:RUNNER_TEMP 'onefile-home'
          $env:HOME = $onefileHome
          $env:USERPROFILE = $onefileHome
          $env:APPDATA = Join-Path $onefileHome 'roaming'
          $env:LOCALAPPDATA = Join-Path $onefileHome 'local'
          $stdout = Join-Path $env:RUNNER_TEMP 'onefile-rclone-path.txt'
          $stderr = Join-Path $env:RUNNER_TEMP 'onefile-rclone-path.stderr'
          $app = Start-Process `
            -FilePath '.\target\onefile\SSHMountMate.exe' `
            -ArgumentList '--rclone-path' `
            -RedirectStandardOutput $stdout `
            -RedirectStandardError $stderr `
            -Wait -PassThru
          if ($app.ExitCode -ne 0) {
            throw "onefile rclone resolution failed`n$(Get-Content $stderr -Raw)"
          }
          $rclonePath = (Get-Content $stdout -Raw).Trim()
          if (-not (Test-Path $rclonePath -PathType Leaf)) {
            throw "onefile did not materialize embedded rclone at '$rclonePath'"
          }
          $actual = (Get-FileHash -Algorithm SHA256 $rclonePath).Hash.ToLowerInvariant()
          if ($actual -ne $env:SSH_MOUNTMATE_EMBED_RCLONE_SHA256) {
            throw "materialized onefile rclone digest mismatch: $actual"
          }
          $rclone = Start-Process -FilePath $rclonePath -ArgumentList 'version' -Wait -PassThru
          if ($rclone.ExitCode -ne 0) { throw "materialized onefile rclone failed" }
          $plinkStdout = Join-Path $env:RUNNER_TEMP 'onefile-plink-path.txt'
          $plinkApp = Start-Process `
            -FilePath '.\target\onefile\SSHMountMate.exe' `
            -ArgumentList '--plink-path' `
            -RedirectStandardOutput $plinkStdout `
            -RedirectStandardError $stderr `
            -Wait -PassThru
          if ($plinkApp.ExitCode -ne 0) { throw "onefile Plink resolution failed" }
          $plinkPath = (Get-Content $plinkStdout -Raw).Trim()
          $plinkActual = (Get-FileHash -Algorithm SHA256 $plinkPath).Hash.ToLowerInvariant()
          if ($plinkActual -ne $env:SSH_MOUNTMATE_EMBED_PLINK_SHA256) {
            throw "materialized onefile Plink digest mismatch: $plinkActual"
          }
          $plink = Start-Process -FilePath $plinkPath -ArgumentList '-V' -Wait -PassThru
          if ($plink.ExitCode -ne 0) { throw "materialized onefile Plink failed" }
