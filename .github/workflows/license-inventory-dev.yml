name: Generate development license inventory

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.88.0
      - name: Generate inventory
        shell: bash
        env:
          CARGO_ABOUT_VERSION: 0.9.1
          CARGO_ABOUT_SHA256: c0e7dc6f5d74b0beec5c0053d39ab24514c717d19acd91886907a22457ea9e98
        run: |
          set -euo pipefail
          archive="cargo-about-${CARGO_ABOUT_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/EmbarkStudios/cargo-about/releases/download/${CARGO_ABOUT_VERSION}/${archive}" \
            --output "${RUNNER_TEMP}/${archive}"
          echo "${CARGO_ABOUT_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum --check
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}"
          cargo_about="${RUNNER_TEMP}/cargo-about-${CARGO_ABOUT_VERSION}-x86_64-unknown-linux-musl/cargo-about"
          sh scripts/generate-rust-licenses.sh "${cargo_about}" generated-RUST-THIRD-PARTY.txt online
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: generated-license-inventory
          path: generated-RUST-THIRD-PARTY.txt
          if-no-files-found: error
