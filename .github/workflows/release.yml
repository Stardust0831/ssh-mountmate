name: Release SSH MountMate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.4.1-alpha.1"
        required: true
        type: string
      publish:
        description: "Create or update the GitHub release after all builds pass"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - name: Enforce Rust-only product tree
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(git ls-files '*.py' '*.spec' pyproject.toml launcher.py)"
          python_action='actions/setup''-python'
          if git grep -n "${python_action}" -- .github; then
            echo 'Python setup actions are not allowed in the Rust release tree' >&2
            exit 1
          fi
      - name: Audit dependency licenses and sources
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe
        with:
          command: check
          command-arguments: licenses sources
          arguments: --all-features
      - name: Install Linux GUI dependencies
        run: sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 update && sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 install -y libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libgtk-3-dev libayatana-appindicator3-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - name: Verify live stable and prerelease update channels
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: cargo test --package mountmate-core update_live_ --all-features -- --ignored --test-threads=1
      - name: Install stable Cargo for cross-target license metadata
        run: rustup toolchain install 1.88.0 --profile minimal
      - name: Verify generated Rust license inventory
        shell: bash
        env:
          CARGO_ABOUT_VERSION: 0.9.1
          CARGO_ABOUT_SHA256: c0e7dc6f5d74b0beec5c0053d39ab24514c717d19acd91886907a22457ea9e98
          CARGO_NET_RETRY: 10
          RUSTUP_TOOLCHAIN: 1.88.0
        run: |
          set -euo pipefail
          archive="cargo-about-${CARGO_ABOUT_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          url="https://github.com/EmbarkStudios/cargo-about/releases/download/${CARGO_ABOUT_VERSION}/${archive}"
          curl --fail --location --silent --show-error "${url}" --output "${RUNNER_TEMP}/${archive}"
          echo "${CARGO_ABOUT_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum --check
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}"
          cargo_about="${RUNNER_TEMP}/cargo-about-${CARGO_ABOUT_VERSION}-x86_64-unknown-linux-musl/cargo-about"
          test -x "${cargo_about}"
          "${cargo_about}" --version
          generated="${RUNNER_TEMP}/RUST-THIRD-PARTY.txt"
          sh scripts/generate-rust-licenses.sh "${cargo_about}" "${generated}" online
          cmp "${generated}" licenses/RUST-THIRD-PARTY.txt

  build:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: SSHMountMate-windows-x64
            rclone_platform: windows
            rclone_arch: amd64
            rclone_sha256: ef097ef9de37a57feb7d9f9c7afb34148ad3c65be8025f1d8f7f521554a701ea
            plink_arch: w64
            plink_sha256: e5621ffe4879f0ec39ed40f688db9399c2d43054d41ef14472fa335c4693b915
          - os: windows-11-arm
            asset: SSHMountMate-windows-arm64
            rclone_platform: windows
            rclone_arch: arm64
            rclone_sha256: 72194ad0aaf210d7a55808801191fecc7e175444dab7be7491b7a63074521f3a
            plink_arch: wa64
            plink_sha256: 998011ef455dabbb66c176913ea897a58e176402d53dc01607a5b36610a7f5fa
          - os: macos-15-intel
            asset: SSHMountMate-macos-x64
            rclone_platform: osx
            rclone_arch: amd64
            rclone_sha256: 4188aa84043d7a6240912923f47639a9d2da21f3b40a521c065c8d92e66563f6
          - os: macos-14
            asset: SSHMountMate-macos-arm64
            rclone_platform: osx
            rclone_arch: arm64
            rclone_sha256: c2100e2d4a4b3be04c55cd45380cafe7647e1ad772bb055f52f00876ed701167
          - os: ubuntu-latest
            asset: SSHMountMate-linux-x64
            rclone_platform: linux
            rclone_arch: amd64
            rclone_sha256: fe435e0c36228e7c2f116a8701f01127bb1f694005fc11d1f27186c8bca4115d
          - os: ubuntu-24.04-arm
            asset: SSHMountMate-linux-arm64
            rclone_platform: linux
            rclone_arch: arm64
            rclone_sha256: 97685285c9ad6a0cf17d5844115d2a67245af6444db672187074bd9c358de419
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}
      - name: Validate release version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          test -z "$(git ls-files '*.py' '*.spec' pyproject.toml launcher.py)"
          python_action='actions/setup''-python'
          if git grep -n "${python_action}" -- .github; then
            echo 'Python setup actions are not allowed in the Rust release tree' >&2
            exit 1
          fi
          version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test "${RELEASE_TAG}" = "v${version}"
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(dpkg --print-architecture)" = arm64 ]; then
            sudo find /etc/apt -type f \( -name '*.list' -o -name '*.sources' \) \
              -exec sed -i \
                's|http://ports.ubuntu.com/ubuntu-ports|https://mirror.leaseweb.com/ubuntu-ports|g' \
                {} +
            grep -Rqs 'https://mirror.leaseweb.com/ubuntu-ports' /etc/apt
          fi
          sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 update
          sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 install -y libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libgl1-mesa-dri libgtk-3-dev libayatana-appindicator3-dev zip xvfb xdotool openbox xterm dbus-x11 dunst haskell-gtk-sni-tray-utils weston fuse3 jq kmod openssh-client
      - name: Install verified FUSE-T for macOS mount integration
        if: runner.os == 'macOS'
        shell: bash
        env:
          FUSE_T_VERSION: 1.2.7
          FUSE_T_SHA256: 6a29c747e61a86a405a189efc3de42812d73147135f93a1bb0624c1e7b90e654
        run: |
          set -euo pipefail
          package="fuse-t-macos-installer-${FUSE_T_VERSION}.pkg"
          curl --fail --location --silent --show-error \
            "https://github.com/macos-fuse-t/fuse-t/releases/download/${FUSE_T_VERSION}/${package}" \
            --output "${RUNNER_TEMP}/${package}"
          echo "${FUSE_T_SHA256}  ${RUNNER_TEMP}/${package}" | shasum -a 256 --check
          sudo installer -pkg "${RUNNER_TEMP}/${package}" -target /
          test -e /usr/local/lib/libfuse-t.dylib
      - run: cargo test --workspace --all-features
      - name: Exercise native system credential store
        if: runner.os == 'Windows' || runner.os == 'macOS'
        run: cargo test --package mountmate-core live_system_credential_roundtrip --all-features -- --ignored --exact --test-threads=1
      - run: cargo build --release --package ssh-mountmate

      - name: Verify Windows execution manifest
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $manifest = Join-Path $env:RUNNER_TEMP 'SSHMountMate.manifest'
          $sdkBin = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\bin'
          $toolArch = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'arm64' } else { 'x64' }
          $mt = Get-ChildItem $sdkBin -Filter mt.exe -Recurse -ErrorAction Stop |
            Where-Object { $_.Directory.Name -eq $toolArch } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $mt) { throw "Windows SDK mt.exe was not found for $toolArch" }
          & $mt.FullName -nologo "-inputresource:target/release/SSHMountMate.exe;#1" "-out:$manifest"
          if ($LASTEXITCODE -ne 0) { throw 'could not extract Windows execution manifest' }
          $content = Get-Content $manifest -Raw
          if ($content -notmatch 'requestedExecutionLevel' `
              -or $content -notmatch 'level="asInvoker"' `
              -or $content -notmatch 'uiAccess="false"') {
            throw "Windows executable is missing an explicit asInvoker manifest`n$content"
          }
          if ($content -match 'requireAdministrator|highestAvailable') {
            throw "Windows executable unexpectedly requests elevation`n$content"
          }

      - name: Build Freedesktop notification protocol probe
        if: runner.os == 'Linux'
        run: cargo build --release --package ssh-mountmate --example freedesktop_notification_probe

      - name: Exercise Linux X11 notification and tray integration
        if: runner.os == 'Linux'
        timeout-minutes: 3
        shell: bash
        run: xvfb-run -a dbus-run-session -- bash tests/rust_single_instance_smoke.sh target/release/SSHMountMate

      - name: Exercise Linux Wayland notification and tray capability integration
        if: runner.os == 'Linux'
        timeout-minutes: 3
        shell: bash
        run: dbus-run-session -- bash tests/rust_wayland_smoke.sh target/release/SSHMountMate

      - name: Exercise Windows one-instance, tray, and taskbar integration
        if: runner.os == 'Windows'
        timeout-minutes: 3
        shell: pwsh
        run: ./tests/rust_windows_gui_smoke.ps1 -Binary target/release/SSHMountMate.exe

      - name: Bundle verified rclone
        if: runner.os != 'Windows'
        shell: bash
        env:
          RCLONE_VERSION: v1.74.4
          RCLONE_PLATFORM: ${{ matrix.rclone_platform }}
          RCLONE_ARCH: ${{ matrix.rclone_arch }}
          RCLONE_SHA256: ${{ matrix.rclone_sha256 }}
        run: |
          set -euo pipefail
          archive="rclone-${RCLONE_VERSION}-${RCLONE_PLATFORM}-${RCLONE_ARCH}.zip"
          curl --fail --location --silent --show-error \
            "https://downloads.rclone.org/${RCLONE_VERSION}/${archive}" \
            --output "${RUNNER_TEMP}/${archive}"
          echo "${RCLONE_SHA256}  ${RUNNER_TEMP}/${archive}" | shasum -a 256 --check
          mkdir -p "${RUNNER_TEMP}/rclone" target/release/bin
          unzip -q "${RUNNER_TEMP}/${archive}" -d "${RUNNER_TEMP}/rclone"
          find "${RUNNER_TEMP}/rclone" -type f -name rclone -exec cp {} target/release/bin/rclone \;
          chmod 755 target/release/bin/rclone
          shasum -a 256 target/release/bin/rclone | awk '{print $1}' > target/release/bin/rclone.sha256

      - name: Bundle verified rclone and Plink
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RCLONE_VERSION: v1.74.4
          RCLONE_PLATFORM: ${{ matrix.rclone_platform }}
          RCLONE_ARCH: ${{ matrix.rclone_arch }}
          RCLONE_SHA256: ${{ matrix.rclone_sha256 }}
          PLINK_VERSION: '0.84'
          PLINK_ARCH: ${{ matrix.plink_arch }}
          PLINK_SHA256: ${{ matrix.plink_sha256 }}
        run: |
          $archive = "rclone-$env:RCLONE_VERSION-$env:RCLONE_PLATFORM-$env:RCLONE_ARCH.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP $archive
          Invoke-WebRequest "https://downloads.rclone.org/$env:RCLONE_VERSION/$archive" -OutFile $archivePath
          $actual = (Get-FileHash -Algorithm SHA256 $archivePath).Hash.ToLowerInvariant()
          if ($actual -ne $env:RCLONE_SHA256) { throw "rclone archive SHA-256 mismatch: $actual" }
          $extract = Join-Path $env:RUNNER_TEMP rclone
          Expand-Archive -Path $archivePath -DestinationPath $extract -Force
          New-Item -ItemType Directory -Force target/release/bin | Out-Null
          $binary = Get-ChildItem -Path $extract -Recurse -File -Filter rclone.exe | Select-Object -First 1
          if (-not $binary) { throw "rclone archive did not contain rclone.exe" }
          Copy-Item $binary.FullName target/release/bin/rclone.exe
          (Get-FileHash -Algorithm SHA256 target/release/bin/rclone.exe).Hash.ToLowerInvariant() |
            Set-Content -NoNewline target/release/bin/rclone.exe.sha256
          $plinkUrl = "https://the.earth.li/~sgtatham/putty/$env:PLINK_VERSION/$env:PLINK_ARCH/plink.exe"
          Invoke-WebRequest $plinkUrl -OutFile target/release/bin/plink.exe
          $plinkActual = (Get-FileHash -Algorithm SHA256 target/release/bin/plink.exe).Hash.ToLowerInvariant()
          if ($plinkActual -ne $env:PLINK_SHA256) { throw "Plink SHA-256 mismatch: $plinkActual" }
          $plinkActual | Set-Content -NoNewline target/release/bin/plink.exe.sha256

      - name: Assemble directory bundle
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          root="target/package/SSHMountMate"
          mkdir -p "${root}/bin"
          cp target/release/SSHMountMate "${root}/SSHMountMate"
          cp target/release/bin/rclone target/release/bin/rclone.sha256 "${root}/bin/"
          cp THIRD_PARTY_NOTICES.md licenses/*.txt distribution/SSHMountMate.install-layout "${root}/"
          chmod 755 "${root}/SSHMountMate" "${root}/bin/rclone"
          "${root}/SSHMountMate" --version

      - name: Assemble directory bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = 'target/package/SSHMountMate'
          New-Item -ItemType Directory -Force "$root/bin" | Out-Null
          Copy-Item target/release/SSHMountMate.exe "$root/SSHMountMate.exe"
          Copy-Item target/release/bin/rclone.exe, target/release/bin/rclone.exe.sha256, target/release/bin/plink.exe, target/release/bin/plink.exe.sha256 "$root/bin/"
          Copy-Item THIRD_PARTY_NOTICES.md, licenses/*.txt, distribution/SSHMountMate.install-layout $root
          $process = Start-Process -FilePath "$root/SSHMountMate.exe" -ArgumentList '--version' -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "release executable smoke test failed" }
          $plink = Start-Process -FilePath "$root/bin/plink.exe" -ArgumentList '-V' -Wait -PassThru
          if ($plink.ExitCode -ne 0) { throw "release Plink smoke test failed" }

      - name: Assemble macOS application bundle
        if: runner.os == 'macOS'
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          app="target/package/SSH MountMate.app"
          contents="${app}/Contents"
          mkdir -p "${contents}/MacOS" "${contents}/Resources/bin" "${contents}/Resources/licenses"
          cp target/release/SSHMountMate "${contents}/MacOS/SSHMountMate"
          cp target/release/bin/rclone target/release/bin/rclone.sha256 "${contents}/Resources/bin/"
          cp THIRD_PARTY_NOTICES.md licenses/*.txt "${contents}/Resources/licenses/"
          version="${RELEASE_TAG#v}"
          sed -e "s/@VERSION@/${version}/g" -e "s/@BUILD_VERSION@/${GITHUB_RUN_NUMBER}/g" \
            distribution/macos/Info.plist > "${contents}/Info.plist"
          chmod 755 "${contents}/MacOS/SSHMountMate" "${contents}/Resources/bin/rclone"
          plutil -lint "${contents}/Info.plist"
          codesign --force --deep --sign - "${app}"
          codesign --verify --deep --strict --verbose=2 "${app}"
          "${contents}/MacOS/SSHMountMate" --version

      - name: Exercise macOS notification, menu bar, and Dock integration
        if: runner.os == 'macOS'
        timeout-minutes: 3
        shell: bash
        run: bash tests/rust_macos_gui_smoke.sh "target/package/SSH MountMate.app"

      - name: Package ZIP
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          ditto -c -k --keepParent "target/package/SSH MountMate.app" "release/${{ matrix.asset }}.zip"
          unzip -t "release/${{ matrix.asset }}.zip"
          extracted="${RUNNER_TEMP}/release-smoke"
          mkdir -p "${extracted}"
          ditto -x -k "release/${{ matrix.asset }}.zip" "${extracted}"
          app="${extracted}/SSH MountMate.app"
          codesign --verify --deep --strict --verbose=2 "${app}"
          "${app}/Contents/MacOS/SSHMountMate" --version
          "${app}/Contents/Resources/bin/rclone" version
          test -z "$(find "${extracted}" -type f \( -iname '*.py' -o -iname 'python*' -o -iname 'libpython*' \) -print -quit)"

      - name: Build and package embedded-rclone onefile
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          export SSH_MOUNTMATE_EMBED_RCLONE_PATH="$(pwd)/target/release/bin/rclone"
          export SSH_MOUNTMATE_EMBED_RCLONE_SHA256="$(tr -d '[:space:]' < target/release/bin/rclone.sha256)"
          cargo build --release --package ssh-mountmate
          mkdir -p target/onefile release
          cp target/release/SSHMountMate target/onefile/SSHMountMate
          chmod 755 target/onefile/SSHMountMate
          (cd target/onefile && zip -q "${GITHUB_WORKSPACE}/release/${{ matrix.asset }}.zip" SSHMountMate)
          extracted="${RUNNER_TEMP}/onefile-release-smoke"
          home="${RUNNER_TEMP}/onefile-home"
          mkdir -p "${extracted}" "${home}"
          unzip -q "release/${{ matrix.asset }}.zip" -d "${extracted}"
          rclone_path="$(
            HOME="${home}" \
            XDG_CONFIG_HOME="${home}/config" \
            XDG_CACHE_HOME="${home}/cache" \
            XDG_STATE_HOME="${home}/state" \
            XDG_DATA_HOME="${home}/data" \
            "${extracted}/SSHMountMate" --rclone-path
          )"
          test -x "${rclone_path}"
          test "$(shasum -a 256 "${rclone_path}" | awk '{print $1}')" = \
            "${SSH_MOUNTMATE_EMBED_RCLONE_SHA256}"
          "${rclone_path}" version
          test -z "$(find "${extracted}" -type f \( -iname '*.py' -o -iname 'python*' -o -iname 'libpython*' \) -print -quit)"

      - name: Build and package embedded-rclone onefile
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:SSH_MOUNTMATE_EMBED_RCLONE_PATH = (Resolve-Path 'target/release/bin/rclone.exe').Path
          $env:SSH_MOUNTMATE_EMBED_RCLONE_SHA256 = (Get-Content 'target/release/bin/rclone.exe.sha256' -Raw).Trim()
          $env:SSH_MOUNTMATE_EMBED_PLINK_PATH = (Resolve-Path 'target/release/bin/plink.exe').Path
          $env:SSH_MOUNTMATE_EMBED_PLINK_SHA256 = (Get-Content 'target/release/bin/plink.exe.sha256' -Raw).Trim()
          cargo build --release --package ssh-mountmate
          if ($LASTEXITCODE -ne 0) { throw "onefile build failed" }
          New-Item -ItemType Directory -Force target/onefile, release | Out-Null
          Copy-Item target/release/SSHMountMate.exe target/onefile/SSHMountMate.exe
          Compress-Archive -Path target/onefile/SSHMountMate.exe -DestinationPath "release/${{ matrix.asset }}.zip"
          $test = Join-Path $env:RUNNER_TEMP onefile-release-smoke
          Expand-Archive "release/${{ matrix.asset }}.zip" $test
          $onefileHome = Join-Path $env:RUNNER_TEMP 'onefile-home'
          $env:HOME = $onefileHome
          $env:USERPROFILE = $onefileHome
          $env:APPDATA = Join-Path $onefileHome 'roaming'
          $env:LOCALAPPDATA = Join-Path $onefileHome 'local'
          $stdout = Join-Path $env:RUNNER_TEMP 'onefile-rclone-path.txt'
          $stderr = Join-Path $env:RUNNER_TEMP 'onefile-rclone-path.stderr'
          $app = Start-Process `
            -FilePath "$test/SSHMountMate.exe" `
            -ArgumentList '--rclone-path' `
            -RedirectStandardOutput $stdout `
            -RedirectStandardError $stderr `
            -Wait -PassThru
          if ($app.ExitCode -ne 0) {
            throw "onefile rclone resolution failed`n$(Get-Content $stderr -Raw)"
          }
          $rclonePath = (Get-Content $stdout -Raw).Trim()
          if (-not (Test-Path $rclonePath -PathType Leaf)) {
            throw "onefile did not materialize embedded rclone at '$rclonePath'"
          }
          $actual = (Get-FileHash -Algorithm SHA256 $rclonePath).Hash.ToLowerInvariant()
          if ($actual -ne $env:SSH_MOUNTMATE_EMBED_RCLONE_SHA256) {
            throw "materialized onefile rclone digest mismatch: $actual"
          }
          $rclone = Start-Process -FilePath $rclonePath -ArgumentList 'version' -Wait -PassThru
          if ($rclone.ExitCode -ne 0) { throw "materialized onefile rclone failed" }
          $plinkStdout = Join-Path $env:RUNNER_TEMP 'onefile-plink-path.txt'
          $plinkApp = Start-Process `
            -FilePath "$test/SSHMountMate.exe" `
            -ArgumentList '--plink-path' `
            -RedirectStandardOutput $plinkStdout `
            -RedirectStandardError $stderr `
            -Wait -PassThru
          if ($plinkApp.ExitCode -ne 0) { throw "onefile Plink resolution failed" }
          $plinkPath = (Get-Content $plinkStdout -Raw).Trim()
          $plinkActual = (Get-FileHash -Algorithm SHA256 $plinkPath).Hash.ToLowerInvariant()
          if ($plinkActual -ne $env:SSH_MOUNTMATE_EMBED_PLINK_SHA256) {
            throw "materialized onefile Plink digest mismatch: $plinkActual"
          }
          $plink = Start-Process -FilePath $plinkPath -ArgumentList '-V' -Wait -PassThru
          if ($plink.ExitCode -ne 0) { throw "materialized onefile Plink failed" }

      - name: Extract final Unix release artifact for integration tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          shipping="${RUNNER_TEMP}/shipping-package"
          rm -rf "${shipping}"
          mkdir -p "${shipping}"
          unzip -q "release/${{ matrix.asset }}.zip" -d "${shipping}"

      - name: Extract final Windows release artifact for integration tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $shipping = Join-Path $env:RUNNER_TEMP 'shipping-package'
          Remove-Item $shipping -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive "release/${{ matrix.asset }}.zip" $shipping

      - name: Exercise packaged update and rollback
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          xvfb-run -a dbus-run-session -- \
            bash tests/rust_packaged_update_smoke.sh "${RUNNER_TEMP}/shipping-package"

      - name: Exercise real SFTP mount, refresh, upload, and unmount
        if: runner.os == 'Linux'
        shell: bash
        run: |
          xvfb-run -a dbus-run-session -- \
            bash tests/rust_linux_mount_smoke.sh "${RUNNER_TEMP}/shipping-package"

      - name: Exercise OpenSSH, concurrent login mounts, and transfer windows
        if: runner.os == 'Linux'
        timeout-minutes: 5
        shell: bash
        run: |
          xvfb-run -a dbus-run-session -- \
            bash tests/rust_linux_openssh_startup_smoke.sh "${RUNNER_TEMP}/shipping-package"

      - name: Exercise packaged update and rollback
        if: runner.os == 'macOS'
        shell: bash
        env:
          SSH_MOUNTMATE_PACKAGE_ROOT: ${{ runner.temp }}/shipping-package/SSH MountMate.app
        run: cargo test --package mountmate-core --test packaged_update --all-features -- --ignored --test-threads=1

      - name: Exercise packaged update and rollback
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:SSH_MOUNTMATE_PACKAGE_ROOT = (Resolve-Path (Join-Path $env:RUNNER_TEMP 'shipping-package')).Path
          cargo test --package mountmate-core --test packaged_update --all-features -- --ignored --test-threads=1
          if ($LASTEXITCODE -ne 0) { throw "packaged update integration test failed" }

      - name: Exercise real SFTP mount, refresh, upload, and unmount
        if: runner.os == 'Windows'
        timeout-minutes: 5
        shell: pwsh
        run: ./tests/rust_windows_mount_smoke.ps1 -PackageRoot (Join-Path $env:RUNNER_TEMP 'shipping-package')

      - name: Exercise real macOS FUSE mount lifecycle and performance record
        if: runner.os == 'macOS'
        timeout-minutes: 7
        shell: bash
        run: bash tests/rust_macos_mount_smoke.sh "${RUNNER_TEMP}/shipping-package/SSH MountMate.app" fuse

      - name: Exercise real macOS NFS mount lifecycle and performance record
        if: runner.os == 'macOS'
        timeout-minutes: 7
        shell: bash
        run: bash tests/rust_macos_mount_smoke.sh "${RUNNER_TEMP}/shipping-package/SSH MountMate.app" nfs

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}
          path: release/${{ matrix.asset }}.zip
          if-no-files-found: error

  release-set:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Validate release set
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            SSHMountMate-windows-x64.zip
            SSHMountMate-windows-arm64.zip
            SSHMountMate-macos-x64.zip
            SSHMountMate-macos-arm64.zip
            SSHMountMate-linux-x64.zip
            SSHMountMate-linux-arm64.zip
          )
          for asset in "${expected[@]}"; do
            test -s "release-assets/${asset}"
          done
          test "$(find release-assets -maxdepth 1 -name 'SSHMountMate-*.zip' | wc -l)" -eq 6
          (cd release-assets && sha256sum SSHMountMate-*.zip > SHA256SUMS.txt)
          (cd release-assets && sha256sum --check SHA256SUMS.txt)

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0

      - name: Install signing tool system dependencies
        run: |
          sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 update
          sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 install -y libdbus-1-dev pkg-config

      - name: Exercise signed release set with an ephemeral test key
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          channel=stable
          case "${version}" in
            *-*) channel=prerelease ;;
          esac
          cargo build --release --package mountmate-core --bin update-signing
          target/release/update-signing exercise-local release-assets "${version}" "${channel}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SSHMountMate-release-set
          path: release-assets/
          if-no-files-found: error

  publish:
    needs: release-set
    if: github.event_name == 'push' || inputs.publish
    runs-on: ubuntu-latest
    environment: production-update-signing
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: 1.97.0
      - name: Install signing tool system dependencies
        run: |
          sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 update
          sudo apt-get -o Acquire::ForceIPv4=true -o Acquire::Retries=5 install -y libdbus-1-dev pkg-config
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: SSHMountMate-release-set
          path: release-assets

      - name: Verify the existing tag identifies this exact build
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tag_commit="$(git rev-list -n 1 "refs/tags/${RELEASE_TAG}")"
          checked_out_commit="$(git rev-parse HEAD)"
          test "${tag_commit}" = "${checked_out_commit}"
          if [ "${GITHUB_EVENT_NAME}" = push ]; then
            test "${tag_commit}" = "${GITHUB_SHA}"
          fi

      - name: Build signing tool before exposing the private key
        run: cargo build --release --package mountmate-core --bin update-signing

      - name: Create and verify signed update manifest
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          UPDATE_ED25519_PRIVATE_KEY_PKCS8_B64: ${{ secrets.UPDATE_ED25519_PRIVATE_KEY_PKCS8_B64 }}
          UPDATE_ED25519_KEY_ID: ${{ vars.UPDATE_ED25519_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "${UPDATE_ED25519_PRIVATE_KEY_PKCS8_B64}"
          test -n "${UPDATE_ED25519_KEY_ID}"
          version="${RELEASE_TAG#v}"
          channel=stable
          case "${version}" in
            *-*) channel=prerelease ;;
          esac
          env -u UPDATE_ED25519_PRIVATE_KEY_PKCS8_B64 \
            jq -e --arg key_id "${UPDATE_ED25519_KEY_ID}" \
            '.keys | any(.key_id == $key_id)' distribution/update-public-keys.json >/dev/null
          env -u UPDATE_ED25519_PRIVATE_KEY_PKCS8_B64 \
            target/release/update-signing manifest \
              release-assets "${version}" "${channel}" "${UPDATE_ED25519_KEY_ID}" \
              release-assets/SSHMountMate-update-manifest-v1.json
          printf '%s' "${UPDATE_ED25519_PRIVATE_KEY_PKCS8_B64}" \
            | env -u UPDATE_ED25519_PRIVATE_KEY_PKCS8_B64 \
                target/release/update-signing sign \
                  release-assets/SSHMountMate-update-manifest-v1.json \
                  release-assets/SSHMountMate-update-manifest-v1.sig
          unset UPDATE_ED25519_PRIVATE_KEY_PKCS8_B64
          target/release/update-signing verify-local \
            release-assets/SSHMountMate-update-manifest-v1.json \
            release-assets/SSHMountMate-update-manifest-v1.sig \
            distribution/update-public-keys.json release-assets

      - name: Create draft, verify GitHub metadata, and publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          fi
          notes=(--notes "Native Rust release of SSH MountMate for Windows, macOS, and Linux.")
          if [ -f "release-notes/${tag}.md" ]; then
            notes=(--notes-file "release-notes/${tag}.md")
          fi
          prerelease=()
          prerelease_value=false
          case "${tag}" in
            *-rc*|*-pre*|*-beta*|*-alpha*) prerelease=(--prerelease); prerelease_value=true ;;
          esac
          mapfile -t files < <(find release-assets -maxdepth 1 -type f | sort)
          drafts="${RUNNER_TEMP}/github-draft-releases.tsv"
          gh api --paginate "repos/${GH_REPO}/releases?per_page=100" \
            --jq '.[] | select(.draft) | [.id, .tag_name] | @tsv' >"${drafts}"
          draft_count="$(awk -F '\t' -v tag="${tag}" '$2 == tag { count++ } END { print count + 0 }' \
            "${drafts}")"
          if gh api "repos/${GH_REPO}/releases/tags/${tag}" >/dev/null 2>&1 \
            || [ "${draft_count}" -ne 0 ]; then
            echo "refusing to replace existing GitHub Release ${tag}" >&2
            exit 1
          fi
          release_id=""
          published=false
          rollback() {
            status=$?
            trap - ERR
            set +e
            if [ -z "${release_id}" ]; then
              gh api --paginate "repos/${GH_REPO}/releases?per_page=100" \
                --jq '.[] | select(.draft) | [.id, .tag_name] | @tsv' >"${drafts}"
              release_id="$(awk -F '\t' -v tag="${tag}" \
                '$2 == tag { count++; id = $1 } END { if (count == 1) print id }' "${drafts}")"
            fi
            if [ -n "${release_id}" ]; then
              if [ "${published}" = true ]; then
                gh api -X PATCH "repos/${GH_REPO}/releases/${release_id}" \
                  -F draft=true -F prerelease="${prerelease_value}" >/dev/null
              else
                gh api -X DELETE "repos/${GH_REPO}/releases/${release_id}" >/dev/null
              fi
            fi
            exit "${status}"
          }
          trap rollback ERR
          gh release create "${tag}" "${files[@]}" --repo "${GH_REPO}" --draft \
            --title "SSH MountMate ${tag}" "${prerelease[@]}" "${notes[@]}"
          metadata="${RUNNER_TEMP}/github-release.json"
          for _ in $(seq 1 30); do
            gh api --paginate "repos/${GH_REPO}/releases?per_page=100" \
              --jq '.[] | select(.draft) | [.id, .tag_name] | @tsv' >"${drafts}"
            release_id="$(awk -F '\t' -v tag="${tag}" \
              '$2 == tag { count++; id = $1 } END { if (count == 1) print id }' "${drafts}")"
            if [ -n "${release_id}" ]; then
              gh api "repos/${GH_REPO}/releases/${release_id}" >"${metadata}"
            fi
            if [ -n "${release_id}" ] && jq -e '
              [.assets[] | select(.name | startswith("SSHMountMate-") and endswith(".zip"))]
              | length == 6 and all(.[]; (.digest // "") | startswith("sha256:"))
            ' "${metadata}" >/dev/null; then
              break
            fi
            release_id=""
            sleep 2
          done
          test -n "${release_id}"
          expected_metadata="${RUNNER_TEMP}/expected-published-release.json"
          canonical_base="https://github.com/${GH_REPO}/releases/download/${tag}/"
          jq --arg canonical_base "${canonical_base}" \
            '.assets |= map(.browser_download_url = ($canonical_base + .name))' \
            "${metadata}" >"${expected_metadata}"
          target/release/update-signing verify-published \
            release-assets/SSHMountMate-update-manifest-v1.json \
            release-assets/SSHMountMate-update-manifest-v1.sig \
            distribution/update-public-keys.json "${expected_metadata}"
          published=true
          gh api -X PATCH "repos/${GH_REPO}/releases/${release_id}" \
            -F draft=false -F prerelease="${prerelease_value}" >/dev/null
          verified=false
          for _ in $(seq 1 30); do
            gh api "repos/${GH_REPO}/releases/${release_id}" >"${metadata}"
            if target/release/update-signing verify-published \
              release-assets/SSHMountMate-update-manifest-v1.json \
              release-assets/SSHMountMate-update-manifest-v1.sig \
              distribution/update-public-keys.json "${metadata}"; then
              verified=true
              break
            fi
            sleep 2
          done
          test "${verified}" = true
          test "$(gh api "repos/${GH_REPO}/releases/tags/${tag}" --jq .id)" = "${release_id}"
          trap - ERR
